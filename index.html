<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FASY NUCES Aggregate Calculator</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+grotesk:wght@500;700&display=swap" rel="stylesheet" />
        
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            :root
            {
                --bg: #0d1117;
                --surface: #161b22;
                --card: #1c2230;
                --border: #2a3347;
                --accent: #00c9a7;
                --accent2: #0ea5e9;
                --danger: #f87171;
                --text: #e2e8f0;
                --muted: #8b9ab0;
                --radius: 12px;
                --glow: 0 0 20px rgba(0, 201, 167, .18);
            }  

            html{scroll-behavior: smooth;}

            body
            {
                background: var(--bg);
                color: var(--text);
                font-family: 'Inter', sans-serif;
                font-size: 15px;
                line-height: 1.6;
                min-height: 100vh;
            }

            nav
            {
                position: sticky; top: 0; z-index: 100;
                background: rgba(13, 17, 23, 0.88);
                backdrop-filter: blur(14px);
                border-bottom: 1px solid var(--border);
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 32px; height: 62px;
            }

            .nav-brand
            {
                display: flex; align-items: center; gap: 10px;
                font-family: 'Space grotesk', sans-serif;
                font-size: 17px; font-weight: 700;
                color: var(--text); text-decoration: none;
            }

            .nav-brand span{color: var(--accent);}
            .nav-links{display: flex; gap: 6px;}
            .nav-links a
        {
            color: var(--muted); font-size: 14px; font-weight: 500;
            text-decoration: none; padding: 6px 14px;
            border-radius: 8px; transition: all .2s;
        }

        .nav-cta
        {
            background: var(--accent); color: #0d1117 !important;
            border-radius: 8px !important; font-weight: 600 !important;
            transition: opacity .2s !important;
        }

        .nav-cta:hover{opacity: 0.85; background: var(--accent) !important;}

        .hero-badge
        {
            display: inline-block;
            background: rgba(0, 201, 167, 0.1);
            border: 1px solid rgba(0, 201, 167, 0.3);
            color: var(--accent);
            font-size: 12px; font-weight: 600;
            padding: 4px 10px; border-radius: 50px;
            letter-spacing: 0.04em; text-transform: uppercase;
            margin-bottom: 22px;
        }

        .hero h1
        {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(30px, 5vw, 52px);
            font-weight: 700; line-height: 1.15;
        }

        .hero h1 span{color: var(--accent);}
        .hero p
        {
            color: var(--muted); font-size: 16px;
            max-width: 20px; margin: 0 auto 36px;
        }

        .hero-stats
        {
            display: flex; justify-content: center; gap: 40px;
            flex-wrap: wrap; margin-bottom: 40px;
        }

        .hero-stat{text-align: center;}
        .hero-stat .val 
        {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px; font-weight: 700; color: var(--accent);
        }

        .hero-stat .lbl{font-size: 12px; color: var(--muted);}

        .selection{padding: 60px 24px; max-width: 1060px; margin: 0 auto;}
        .selection-title
        {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px; font-weight: 700;
            margin-bottom: 8px;
        }

        .selection-sub{color: var(--muted); font-size: 14px; margin-bottom: 32px;}

        .card-grid{display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:18px;}
        
        .card
        {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .card h3{font-size: 16px; font-weight: 600; margin-bottom: 6px;}
        
        .card p{color: var(--muted); font-size: 13px; margin-bottom: 18px; line-height: 1.5;}

        .card-btn
        {
            display: inline-block; font-size: 13px; font-weight: 600;
            color: var(--accent); text-decoration: none;
            border: 1px solid var(--accent); border-radius: 8px;
            padding: 7px 18px; cursor: pointer;
            background: transparent; transition: all 0.2s;
        }

        .card-btn:hover{background: rgba(0, 201, 167, 0.12);}

        .calc-wrapper
        {
            background: var(--surface);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .calc-inner{max-width: 880px; margin: 0 auto; padding: 60px 24px;}
        .calc-header{margin-bottom: 32px;}

        .tab-bar{display: flex; gap: 4px; margin-bottom: 28px;}
        
        .tab
        {
            padding: 9px 22px; font-size: 14px; font-weight: 600;
            border: 1px solid var(--border); border-radius: 8px;
            background: transparent; color: var(--muted);
            cursor: pointer; transition: all 0.2s;
        }

        .tab.active
        {
            background: var(--accent); color: #0d1117;
            border-color: var(--accent);
        }

        .tab:hover:not(.active){border-color: var(--accent); color: var(--text);}

        .program-toggle
        {
            display: grid; grid-template-columns: 1fr 1fr;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; margin-bottom: 28px;
        }

        .prog-btn
        {
            padding: 14px 20px; cursor: pointer;
            background: transparent; border: none; color: var(--muted);
            font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif;
            text-align: left; transition: all 0.2s;
        }

        .prog-btn.active
        {
            background: rgba(0, 201, 167, 0.1); color: var(--accent); border-right: none;
        }

        .prog-label{font-size: 12px; font-weight: 600; margin-bottom: 2px;}

        .prog-formula{font-size: 11px; color: var(--muted);}

        .prog-btn.active .prog-fromula{color: rgba(0, 201, 167, 0.7);}

        .prog-degrees{font-size: 11px; color: var(--muted); margin-top: 4px}

        .prog-btn.active .progn-degrees{color: rgba(0, 201, 167, 0.6);}

        /*fields*/
        .fields {display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin-bottom:28px;} 
        .fields-group { display:flex; flex-direction: column; gap: 14px  }
        .group-title {font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px;}
        label { font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text); display: block;}
        input[type="number"]
        {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 15px;
            padding: 11px 14px; outline: none; font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
            appearance: textfield;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button{-webkit-appearance: none;}
        input[type="number"]::focus{border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 201, 167, 0.15);}
        input[type="number"].error{border-color: var(--danger);}

        .calc-actions{display:flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap;}

        .btn-primary
        {
            background: transparent; color: var(--muted);
            border: 1px solid var(--border); border-radius: 9px; padding: 12px 24px;
            font-size: 15px; font-weight: 500; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.2s;
        }
        .btn-primary:hover{opacity: 0.85;}
        .btn-secondary
        {
            background: transparent; color: var(--muted);
            border: 1px solid var(--border); border-radius: 9px; padding: 12px 24px;
            font-size: 15px; font-weight: 500; cursor: pointer;
            font-family: 'Inter' sans-serif; transition: all 0.2s;
        }

        /*result box*/
        .result-box
        {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px; margin-top: 10px;
        }

        .result-box.show{display: block; animation: fadeIn 0.35s rease;}
        @keyframes fadeIn{from{opacity: 0; transform: translateY(8px);} to{opacity:1 ; transform: translateY(0);}}

        .result-main
        {
            display: flex; align-items: center; gap: 24px;
            flex-wrap: wrap; margin-bottom: 20px;
        }

        .result-big
        {
            font-family: 'Space Grotest', sans-serif;
            font-size: 52px; font-weight: 700;
            line-height:1; color: var(--accent);
        }

        .result-meta{flex: 1;}
        .result-meta h4{font-size: 16px; font-weight: 600; margin-bottom: 4px;}
        .result-meta p{font-size: 13px; color: var(--muted);}

        .reslut-breakdown
        {
            display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap:12px; border-top: 1px solid var(--border); padding-top: 20px;
        }

        .breakdow-item{text-align: center;}
        .breakdown-item .bval{font-size: 20px; font-weight: 700; color: var(--accent2);}
        .breakdown-item .blbl{font-size: 11px; color: var(--muted); margin-top: 2px;}

        .error-msg{color: var(--danger); font-size: 13px; margin-top: 80px; display: none;}

        /*merit table*/
        .merit-selection{padding: 60px 24px; max-width: 1060px; margin: 0 auto;}
        .year-toggle{display: flex; gap: 8px; margin-bottom: 24px;}
        .year-btn
        {
            padding: 7px 20px; border: 1px solid var(--border);
            border-radius: 8px; background: transparent; color: var(--muted);
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.2s;
        }

        .year-btn.active{background: var(--accent); color: #0d1117; border-color: var(--accent);}

        .merit-table-wrap{overflow-x: auto;}
        table{width: 100%; border-collapse: collapse; font-size: 13px;}

        th
        {
            background:var(--card); color: var(--muted);
            font-weight: 600; font-size: 11px; letter-spacing: 0.05em;
            text-transform: upercase; padding: 12px 16px; text-align: left;
            border-bottom: 1px solid var(--border);
        }

        td
        {
            padding: 13px 16px; border-bottom: 1px solid rgba(42 ,51, 71, 0.5);
            color: var(--text);
        }

        tr:hover td{background: rgba(255, 255, 255, 0.02);}
        
        .badge
        {
            display: inline-block; font-size: 11px; font-weight: 600;
            padding: 2px 9px; border-radius: 5px;
            background: rgba(0, 201, 167, 0.12); color: var(--accent);
        }

        /*FAQ*/
        

        </style>
    
    </head>
    <body>
        
    </body>
</html>
